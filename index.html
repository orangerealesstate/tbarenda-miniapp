<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TBILISI ARENDA</title>

<style>

body{
margin:0;
background:#f4f4f4;
font-family:Arial;
}

.header{
background:white;
padding:20px;
font-size:28px;
font-weight:bold;
position:sticky;
top:0;
}

.card{
background:white;
margin:15px;
border-radius:20px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
}

.info{
padding:15px;
}

.price{
font-size:24px;
color:#ff6600;
font-weight:bold;
}

button{
width:100%;
padding:15px;
border:none;
background:#ff6600;
color:white;
font-size:18px;
border-radius:15px;
margin-top:15px;
}

</style>

</head>
<body>

<div class="header">
🏠 TBILISI ARENDA
</div>

<div id="list"></div>

<script>

fetch("data.json")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(item=>{

html+=`

<div class="card">

<img src="${item.image}">

<div class="info">

<h2>${item.title}</h2>

<div class="price">${item.price}</div>

<p>${item.description}</p>

<button>Подробнее</button>

</div>

</div>

`;

});

document.getElementById("list").innerHTML=html;

});

</script>

</body>
</html>
